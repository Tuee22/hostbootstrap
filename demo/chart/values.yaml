# The project image the in-cluster webservice runs from. Built host-native into
# the project container (build #3) and loaded into / pulled by the kind cluster;
# IfNotPresent so a kind-loaded image is used without a registry round-trip.
image:
  repository: hostbootstrap-demo
  tag: local
  pullPolicy: IfNotPresent

# Applied to the Deployment and overridden from the live project config.
haReplicas: 1

service:
  # Overridden with the frame id and fingerprint of the parent-derived service
  # config. The hash rolls the pod when the separately applied ConfigMap changes.
  currentFrame: cluster-service-3
  configHash: fnv64:0000000000000000
  # The default in-cluster service port (the webservice binds the configured value) and the NodePort the
  # Playwright e2e reaches it through.
  port: 8080
  nodePort: 30080
  # Placement-specific accelerator ingress (a private listener in the same web
  # pod, separate from the configured public application port): the chain
  # overrides `type` from the validated topology. In-cluster Linux daemons use
  # ClusterIP; Apple/Windows host daemons use NodePort 30081, whose kind mapping
  # is bound to 127.0.0.1.
  accelerator:
    type: NodePort
    port: 8081
    targetPort: 8081
    nodePort: 30081
