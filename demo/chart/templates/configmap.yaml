apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  hostbootstrap-demo.dhall: |
    let ContextKind =
          < HostOrchestrator
          | VMOrchestrator
          | VMProjectContainer
          | ImageBuildContainer
          | ClusterService
          | Daemon
          | OneShotJob
          | TestHarness
          >

    let ProviderKind =
          < HostProvider
          | IncusVMProvider
          | LimaVMProvider
          | DockerContainerProvider
          | KubernetesProvider
          | ExternalProvider
          >

    let WitnessKind =
          < WitnessFileExists
          | WitnessUnixSocket
          | WitnessEnvEquals
          | WitnessExecutable
          >

    let Capability =
          < HostTools
          | IncusProvider
          | DockerSocket
          | ContainerRuntime
          | KubernetesAPI
          | KindNetwork
          | DurableStore
          | ServicePort
          >

    let CommandClass =
          < EnsureCommand
          | ConfigInspectionCommand
          | ConfigGenerationCommand
          | ContextCreationCommand
          | ClusterLifecycleCommand
          | TestWorkflowCommand
          | CheckCodeCommand
          | HostOrchestratorCommand
          | DaemonCommand
          | ServiceCommand
          | ProjectCommand
          >

    in  { dockerfile = "docker/Dockerfile"
        , resources = { cpu = 6, memory = "10GiB", storage = "80GiB" }
        , context =
            { project = "hostbootstrap-demo"
            , binary = "hostbootstrap-demo"
            , sourceRoot = "/workspace/demo"
            , contextKind = ContextKind.ClusterService
            , roleName = "cluster-service"
            , parentChain =
                [ { frameKind = ContextKind.HostOrchestrator
                  , frameBinary = "hostbootstrap-demo"
                  }
                , { frameKind = ContextKind.VMOrchestrator
                  , frameBinary = "hostbootstrap-demo"
                  }
                , { frameKind = ContextKind.VMProjectContainer
                  , frameBinary = "hostbootstrap-demo"
                  }
                ]
            , topologyFrames =
                [ { topologyFrameId = "host-orchestrator-0"
                  , topologyParentId = ""
                  , topologyProvider = ProviderKind.HostProvider
                  , topologyKind = ContextKind.HostOrchestrator
                  , topologyRoleName = "host-orchestrator"
                  }
                , { topologyFrameId = "vm-orchestrator-1"
                  , topologyParentId = "host-orchestrator-0"
                  , topologyProvider = ProviderKind.LimaVMProvider
                  , topologyKind = ContextKind.VMOrchestrator
                  , topologyRoleName = "vm-orchestrator"
                  }
                , { topologyFrameId = "vm-project-container-2"
                  , topologyParentId = "vm-orchestrator-1"
                  , topologyProvider = ProviderKind.DockerContainerProvider
                  , topologyKind = ContextKind.VMProjectContainer
                  , topologyRoleName = "vm-project-container"
                  }
                , { topologyFrameId = "cluster-service-3"
                  , topologyParentId = "vm-project-container-2"
                  , topologyProvider = ProviderKind.KubernetesProvider
                  , topologyKind = ContextKind.ClusterService
                  , topologyRoleName = "cluster-service"
                  }
                ]
            , currentFrame = "cluster-service-3"
            , runtimeWitnesses =
                [ { witnessKind = WitnessKind.WitnessEnvEquals
                  , witnessName = "HOSTBOOTSTRAP_CURRENT_FRAME"
                  , witnessValue = "cluster-service-3"
                  }
                ]
            , capabilities =
                [ Capability.KubernetesAPI
                , Capability.DurableStore
                , Capability.ServicePort
                ]
            , allowedCommandClasses =
                [ CommandClass.ConfigInspectionCommand
                , CommandClass.ServiceCommand
                ]
            , resourceEnvelope = { cpu = 6, memory = "10GiB", storage = "80GiB" }
            , childContextKinds = [] : List ContextKind
            }
        , deploy = { haReplicas = {{ .Values.haReplicas }} }
        , message = {{ .Values.demoMessage }}
        }
