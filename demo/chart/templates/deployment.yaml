apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app: {{ .Release.Name }}-web
spec:
  replicas: {{ .Values.haReplicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-web
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-web
      annotations:
        hostbootstrap.io/config-hash: {{ .Values.service.configHash | quote }}
    spec:
      volumes:
        - name: demo-config
          configMap:
            name: {{ .Release.Name }}-config
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The project container's ENTRYPOINT is the demo binary; `service run`
          # runs the demo's `web` service variant — the warp/wai webservice — on
          # the service port (the leaf-frame service run-model, § AA). The pod's
          # cluster-service config arrives as the mounted ConfigMap below.
          args: ["service", "run"]
          env:
            - name: HOSTBOOTSTRAP_CURRENT_FRAME
              value: {{ .Values.service.currentFrame | quote }}
          volumeMounts:
            - name: demo-config
              mountPath: /usr/local/bin/hostbootstrap-demo.dhall
              subPath: hostbootstrap-demo.dhall
              readOnly: true
          ports:
            - name: web
              containerPort: {{ .Values.service.port }}
            - name: accelerator
              containerPort: {{ .Values.service.accelerator.targetPort }}
          readinessProbe:
            httpGet:
              path: /api/budget
              port: {{ .Values.service.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
